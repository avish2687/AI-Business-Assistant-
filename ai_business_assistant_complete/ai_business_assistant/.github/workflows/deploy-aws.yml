name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ai-business-assistant
  EC2_HOST: ${{ secrets.EC2_HOST }}

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          OPENAI_API_KEY: "test-key-for-ci"
          SECRET_KEY: "test-secret-key-for-ci-only"
          DATABASE_URL: "sqlite:///./test.db"
        run: pytest tests/ -v --tb=short

  # ── Job 2: Build & Push Docker image to ECR ───────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Job 3: Deploy to EC2 ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,AWS_REGION
          script: |
            # Authenticate Docker with ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ steps.login-ecr.outputs.registry }}

            # Pull latest image
            docker pull ${{ needs.build-and-push.outputs.image }}

            # Update docker-compose to use new image
            cd /opt/ai-business-assistant
            sed -i 's|image: .*|image: ${{ needs.build-and-push.outputs.image }}|' docker-compose.yml

            # Rolling restart (zero downtime)
            docker compose pull
            docker compose up -d --no-deps --force-recreate api

            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1
            echo "✅ Deployment successful!"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployed ${{ github.sha }} to production at $(date)"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED for ${{ github.sha }}"
          exit 1
