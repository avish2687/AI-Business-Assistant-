<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Business Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    pre { white-space: pre-wrap; word-wrap: break-word; }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API = '';  // Same origin — change to 'http://localhost:8000' if needed

// ── API Helper ───────────────────────────────────────────────────────────────
async function apiFetch(path, options = {}, token = null) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

// ── Icons (SVG inline) ───────────────────────────────────────────────────────
const Icon = ({ name, cls = "w-5 h-5" }) => {
  const icons = {
    marketing: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" /></svg>,
    plan: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
    competitor: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
    social: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" /></svg>,
    rag: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
    agent: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2" /></svg>,
    history: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
    logout: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
    copy: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
    check: <svg className={cls} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
  };
  return icons[name] || null;
};

// ── Reusable Components ───────────────────────────────────────────────────────
const Input = ({ label, ...props }) => (
  <div className="mb-4">
    {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
    <input {...props} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm" />
  </div>
);

const Textarea = ({ label, ...props }) => (
  <div className="mb-4">
    {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
    <textarea {...props} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm resize-none" />
  </div>
);

const Select = ({ label, options, ...props }) => (
  <div className="mb-4">
    {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
    <select {...props} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm bg-white">
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Btn = ({ children, loading, variant = 'primary', ...props }) => {
  const base = "inline-flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-sm transition-all disabled:opacity-60";
  const variants = {
    primary: "bg-purple-600 hover:bg-purple-700 text-white",
    secondary: "bg-gray-100 hover:bg-gray-200 text-gray-700",
    danger: "bg-red-500 hover:bg-red-600 text-white",
  };
  return (
    <button {...props} className={`${base} ${variants[variant]}`} disabled={loading || props.disabled}>
      {loading && <svg className="spinner w-4 h-4" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>}
      {children}
    </button>
  );
};

const ResultBox = ({ content }) => {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(content);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  if (!content) return null;
  return (
    <div className="mt-4 bg-gray-50 border border-gray-200 rounded-xl p-4 fade-in relative">
      <button onClick={copy} className="absolute top-3 right-3 p-1.5 rounded-lg hover:bg-gray-200 text-gray-500 transition-colors">
        {copied ? <Icon name="check" cls="w-4 h-4 text-green-500" /> : <Icon name="copy" cls="w-4 h-4" />}
      </button>
      <pre className="text-sm text-gray-700 leading-relaxed pr-8">{content}</pre>
    </div>
  );
};

const Alert = ({ type, msg }) => {
  if (!msg) return null;
  const styles = { error: 'bg-red-50 border-red-200 text-red-700', success: 'bg-green-50 border-green-200 text-green-700' };
  return <div className={`border rounded-lg p-3 text-sm mb-4 ${styles[type]}`}>{msg}</div>;
};

// ── Auth Page ────────────────────────────────────────────────────────────────
const AuthPage = ({ onLogin }) => {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ email: '', password: '', full_name: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handle = async () => {
    setLoading(true); setError('');
    try {
      if (mode === 'login') {
        const fd = new FormData();
        fd.append('username', form.email); fd.append('password', form.password);
        const res = await fetch(API + '/api/auth/login', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        localStorage.setItem('token', data.access_token);
        const me = await apiFetch('/api/auth/me', {}, data.access_token);
        onLogin(data.access_token, me);
      } else {
        await apiFetch('/api/auth/register', { method: 'POST', body: JSON.stringify(form) });
        setMode('login'); setError(''); alert('Registered! Please login.');
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="min-h-screen gradient-bg flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4">
            <span className="text-white text-2xl">🤖</span>
          </div>
          <h1 className="text-2xl font-bold text-gray-900">AI Business Assistant</h1>
          <p className="text-gray-500 text-sm mt-1">Your intelligent business partner</p>
        </div>

        <div className="flex bg-gray-100 rounded-lg p-1 mb-6">
          {['login','register'].map(m => (
            <button key={m} onClick={() => setMode(m)}
              className={`flex-1 py-2 rounded-md text-sm font-medium transition-all capitalize ${mode===m ? 'bg-white shadow text-purple-700' : 'text-gray-500'}`}>
              {m}
            </button>
          ))}
        </div>

        <Alert type="error" msg={error} />
        {mode === 'register' && <Input label="Full Name" placeholder="John Doe" value={form.full_name} onChange={e => setForm({...form, full_name: e.target.value})} />}
        <Input label="Email" type="email" placeholder="you@example.com" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
        <Input label="Password" type="password" placeholder="••••••••" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />

        <Btn loading={loading} onClick={handle} className="w-full justify-center bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition-all w-full flex items-center justify-center gap-2">
          {mode === 'login' ? 'Sign In' : 'Create Account'}
        </Btn>
      </div>
    </div>
  );
};

// ── Tool Panels ───────────────────────────────────────────────────────────────
const MarketingPanel = ({ token }) => {
  const [form, setForm] = useState({ business_type: '', goal: '' });
  const [result, setResult] = useState(''); const [loading, setLoading] = useState(false); const [error, setError] = useState('');
  const submit = async () => {
    if (!form.business_type || !form.goal) return setError('All fields required');
    setLoading(true); setError(''); setResult('');
    try { const d = await apiFetch('/api/ai/generate-content', { method:'POST', body: JSON.stringify(form) }, token); setResult(d.response); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div>
      <Alert type="error" msg={error} />
      <Input label="Business Type" placeholder="e.g. online bakery, SaaS startup" value={form.business_type} onChange={e => setForm({...form, business_type: e.target.value})} />
      <Input label="Marketing Goal" placeholder="e.g. increase online sales by 30%" value={form.goal} onChange={e => setForm({...form, goal: e.target.value})} />
      <Btn loading={loading} onClick={submit}>Generate Content</Btn>
      <ResultBox content={result} />
    </div>
  );
};

const BusinessPlanPanel = ({ token }) => {
  const sections = ['Executive Summary','Market Analysis','Products & Services','Marketing Strategy','Operations Plan','Financial Projections','Risk Analysis'];
  const [form, setForm] = useState({ business_type: '', section: sections[0], context: '' });
  const [result, setResult] = useState(''); const [loading, setLoading] = useState(false); const [error, setError] = useState('');
  const submit = async () => {
    if (!form.business_type) return setError('Business type required');
    setLoading(true); setError(''); setResult('');
    try { const d = await apiFetch('/api/ai/business-plan', { method:'POST', body: JSON.stringify(form) }, token); setResult(d.content); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div>
      <Alert type="error" msg={error} />
      <Input label="Business Type" placeholder="e.g. cloud kitchen, EdTech startup" value={form.business_type} onChange={e => setForm({...form, business_type: e.target.value})} />
      <Select label="Section" options={sections.map(s=>({value:s,label:s}))} value={form.section} onChange={e => setForm({...form, section: e.target.value})} />
      <Textarea label="Additional Context (optional)" placeholder="Add any specific details..." rows={3} value={form.context} onChange={e => setForm({...form, context: e.target.value})} />
      <Btn loading={loading} onClick={submit}>Generate Section</Btn>
      <ResultBox content={result} />
    </div>
  );
};

const CompetitorPanel = ({ token }) => {
  const [form, setForm] = useState({ business_type: '', market: '' });
  const [result, setResult] = useState(''); const [loading, setLoading] = useState(false); const [error, setError] = useState('');
  const submit = async () => {
    if (!form.business_type || !form.market) return setError('All fields required');
    setLoading(true); setError(''); setResult('');
    try { const d = await apiFetch('/api/ai/competitor-analysis', { method:'POST', body: JSON.stringify(form) }, token); setResult(d.analysis); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div>
      <Alert type="error" msg={error} />
      <Input label="Business Type" placeholder="e.g. fitness app, D2C fashion brand" value={form.business_type} onChange={e => setForm({...form, business_type: e.target.value})} />
      <Input label="Target Market" placeholder="e.g. India tier-2 cities, US millennials" value={form.market} onChange={e => setForm({...form, market: e.target.value})} />
      <Btn loading={loading} onClick={submit}>Analyze Competition</Btn>
      <ResultBox content={result} />
    </div>
  );
};

const SocialMediaPanel = ({ token }) => {
  const platforms = ['Instagram','LinkedIn','Twitter','Facebook'];
  const [form, setForm] = useState({ business_type: '', platform: 'Instagram', topic: '', count: 3 });
  const [result, setResult] = useState([]); const [loading, setLoading] = useState(false); const [error, setError] = useState('');
  const submit = async () => {
    if (!form.business_type || !form.topic) return setError('All fields required');
    setLoading(true); setError(''); setResult([]);
    try { const d = await apiFetch('/api/ai/social-media-posts', { method:'POST', body: JSON.stringify(form) }, token); setResult(d.posts); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div>
      <Alert type="error" msg={error} />
      <div className="grid grid-cols-2 gap-3">
        <Input label="Business Type" placeholder="e.g. jewelry store" value={form.business_type} onChange={e => setForm({...form, business_type: e.target.value})} />
        <Select label="Platform" options={platforms.map(p=>({value:p,label:p}))} value={form.platform} onChange={e => setForm({...form, platform: e.target.value})} />
      </div>
      <Input label="Topic / Campaign" placeholder="e.g. Diwali sale, new product launch" value={form.topic} onChange={e => setForm({...form, topic: e.target.value})} />
      <Select label="Number of Posts" options={[1,2,3,4,5].map(n=>({value:n,label:`${n} post${n>1?'s':''}`}))} value={form.count} onChange={e => setForm({...form, count: parseInt(e.target.value)})} />
      <Btn loading={loading} onClick={submit}>Generate Posts</Btn>
      {result.length > 0 && (
        <div className="mt-4 space-y-3 fade-in">
          {result.map((post, i) => (
            <div key={i} className="bg-gradient-to-r from-purple-50 to-indigo-50 border border-purple-100 rounded-xl p-4">
              <div className="text-xs font-semibold text-purple-600 mb-2">Post {i+1}</div>
              <p className="text-sm text-gray-700">{post}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const RAGPanel = ({ token }) => {
  const [tab, setTab] = useState('query');
  const [ingestText, setIngestText] = useState(''); const [ingestSource, setIngestSource] = useState('');
  const [question, setQuestion] = useState(''); const [answer, setAnswer] = useState(null);
  const [loading, setLoading] = useState(false); const [error, setError] = useState(''); const [success, setSuccess] = useState('');

  const ingest = async () => {
    if (!ingestText) return setError('Enter text to ingest');
    setLoading(true); setError(''); setSuccess('');
    try {
      await apiFetch('/api/rag/ingest', { method:'POST', body: JSON.stringify({ texts:[ingestText], sources:[ingestSource||'manual'], store_name:'default' }) }, token);
      setSuccess('Document ingested successfully!'); setIngestText(''); setIngestSource('');
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const query = async () => {
    if (!question) return setError('Enter a question');
    setLoading(true); setError(''); setAnswer(null);
    try { const d = await apiFetch('/api/rag/query', { method:'POST', body: JSON.stringify({ question, store_name:'default', k:4 }) }, token); setAnswer(d); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div>
      <div className="flex bg-gray-100 rounded-lg p-1 mb-4">
        {['query','ingest'].map(t => (
          <button key={t} onClick={() => { setTab(t); setError(''); setSuccess(''); }}
            className={`flex-1 py-1.5 rounded-md text-sm font-medium transition-all capitalize ${tab===t ? 'bg-white shadow text-purple-700' : 'text-gray-500'}`}>
            {t === 'query' ? '🔍 Ask Questions' : '📤 Upload Documents'}
          </button>
        ))}
      </div>
      <Alert type="error" msg={error} />
      <Alert type="success" msg={success} />
      {tab === 'ingest' ? (
        <>
          <Input label="Source Name (optional)" placeholder="e.g. product_catalog.txt" value={ingestSource} onChange={e => setIngestSource(e.target.value)} />
          <Textarea label="Document Text" placeholder="Paste your document content here..." rows={8} value={ingestText} onChange={e => setIngestText(e.target.value)} />
          <Btn loading={loading} onClick={ingest}>Ingest Document</Btn>
        </>
      ) : (
        <>
          <Textarea label="Your Question" placeholder="e.g. What is the return policy?" rows={3} value={question} onChange={e => setQuestion(e.target.value)} />
          <Btn loading={loading} onClick={query}>Ask Question</Btn>
          {answer && (
            <div className="mt-4 fade-in space-y-3">
              <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                <div className="text-xs font-semibold text-blue-600 mb-2">Answer</div>
                <p className="text-sm text-gray-700">{answer.answer}</p>
              </div>
              <div className="flex gap-4 text-xs text-gray-500">
                <span>📚 Sources: {answer.sources?.join(', ') || 'N/A'}</span>
                <span>🔢 Chunks retrieved: {answer.retrieved_chunks}</span>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
};

const AgentPanel = ({ token }) => {
  const [form, setForm] = useState({ task: '', business_type: '' });
  const [session, setSession] = useState(null); const [loading, setLoading] = useState(false);
  const [polling, setPolling] = useState(false); const [error, setError] = useState('');

  const start = async () => {
    if (!form.task || !form.business_type) return setError('All fields required');
    setLoading(true); setError(''); setSession(null);
    try {
      const d = await apiFetch('/api/agent/run', { method:'POST', body: JSON.stringify(form) }, token);
      setSession(d); setPolling(true);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  useEffect(() => {
    if (!polling || !session?.session_id) return;
    const interval = setInterval(async () => {
      try {
        const d = await apiFetch(`/api/agent/status/${session.session_id}`, {}, token);
        setSession(d);
        if (d.status !== 'running') { setPolling(false); clearInterval(interval); }
      } catch(e) { setPolling(false); clearInterval(interval); }
    }, 3000);
    return () => clearInterval(interval);
  }, [polling, session?.session_id]);

  return (
    <div>
      <div className="bg-gradient-to-r from-purple-50 to-indigo-50 border border-purple-100 rounded-xl p-4 mb-4">
        <p className="text-sm text-purple-700 font-medium">🤖 Autonomous Business Agent</p>
        <p className="text-xs text-purple-600 mt-1">The agent will autonomously research markets, analyze competitors, build a marketing strategy, create an action plan, and project financials — all in one go.</p>
      </div>
      <Alert type="error" msg={error} />
      <Input label="Business Type" placeholder="e.g. cloud kitchen, EdTech app" value={form.business_type} onChange={e => setForm({...form, business_type: e.target.value})} />
      <Textarea label="Task / Goal" placeholder="e.g. Create a complete business analysis for launching a cloud kitchen targeting office lunch in Pune" rows={3} value={form.task} onChange={e => setForm({...form, task: e.target.value})} />
      <Btn loading={loading} onClick={start}>🚀 Launch Agent</Btn>

      {session && (
        <div className="mt-4 fade-in space-y-3">
          <div className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium ${
            session.status === 'running' ? 'bg-yellow-50 text-yellow-700' :
            session.status === 'completed' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'
          }`}>
            {session.status === 'running' && <svg className="spinner w-4 h-4" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>}
            {session.status === 'running' ? `Agent working... (${session.steps_completed || 0} steps done)` :
             session.status === 'completed' ? `✅ Completed — ${session.steps_completed} steps` : `❌ Failed: ${session.error}`}
          </div>
          {session.final_output && <ResultBox content={session.final_output} />}
        </div>
      )}
    </div>
  );
};

const HistoryPanel = ({ token }) => {
  const [history, setHistory] = useState([]); const [loading, setLoading] = useState(true);
  useEffect(() => {
    apiFetch('/api/auth/history', {}, token).then(setHistory).catch(console.error).finally(() => setLoading(false));
  }, []);
  if (loading) return <div className="text-center py-8 text-gray-400">Loading history...</div>;
  if (!history.length) return <div className="text-center py-8 text-gray-400">No history yet. Start generating content!</div>;
  return (
    <div className="space-y-3">
      {history.map(h => (
        <div key={h.id} className="border border-gray-100 rounded-xl p-4 hover:border-purple-200 transition-colors">
          <div className="flex justify-between items-start mb-2">
            <span className="text-xs font-semibold bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">{h.content_type}</span>
            <span className="text-xs text-gray-400">{new Date(h.created_at).toLocaleDateString()}</span>
          </div>
          <p className="text-sm text-gray-600 line-clamp-3">{h.output_preview}</p>
        </div>
      ))}
    </div>
  );
};

// ── Main Dashboard ────────────────────────────────────────────────────────────
const Dashboard = ({ user, token, onLogout }) => {
  const [active, setActive] = useState('marketing');

  const navItems = [
    { id: 'marketing',   label: 'Marketing',     icon: 'marketing'   },
    { id: 'plan',        label: 'Business Plan',  icon: 'plan'        },
    { id: 'competitor',  label: 'Competition',    icon: 'competitor'  },
    { id: 'social',      label: 'Social Media',   icon: 'social'      },
    { id: 'rag',         label: 'Doc Q&A',        icon: 'rag'         },
    { id: 'agent',       label: 'AI Agent',       icon: 'agent'       },
    { id: 'history',     label: 'History',        icon: 'history'     },
  ];

  const titles = { marketing:'Marketing Content', plan:'Business Plan Generator', competitor:'Competitor Analysis', social:'Social Media Posts', rag:'Document Q&A (RAG)', agent:'Autonomous AI Agent', history:'Content History' };
  const panels = { marketing:<MarketingPanel token={token}/>, plan:<BusinessPlanPanel token={token}/>, competitor:<CompetitorPanel token={token}/>, social:<SocialMediaPanel token={token}/>, rag:<RAGPanel token={token}/>, agent:<AgentPanel token={token}/>, history:<HistoryPanel token={token}/> };

  return (
    <div className="flex h-screen bg-gray-50 overflow-hidden">
      {/* Sidebar */}
      <div className="w-64 bg-white border-r border-gray-100 flex flex-col">
        <div className="p-5 border-b border-gray-100">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 gradient-bg rounded-xl flex items-center justify-center">
              <span className="text-white text-lg">🤖</span>
            </div>
            <div>
              <p className="font-bold text-gray-900 text-sm">AI Assistant</p>
              <p className="text-xs text-gray-400">Business Platform</p>
            </div>
          </div>
        </div>

        <nav className="flex-1 p-3 space-y-1 overflow-y-auto">
          {navItems.map(item => (
            <button key={item.id} onClick={() => setActive(item.id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${
                active === item.id ? 'bg-purple-50 text-purple-700' : 'text-gray-600 hover:bg-gray-50'
              }`}>
              <Icon name={item.icon} cls="w-4 h-4 flex-shrink-0" />
              {item.label}
            </button>
          ))}
        </nav>

        <div className="p-3 border-t border-gray-100">
          <div className="flex items-center gap-3 px-3 py-2 mb-1">
            <div className="w-8 h-8 gradient-bg rounded-full flex items-center justify-center text-white text-xs font-bold">
              {(user?.full_name || user?.email || 'U')[0].toUpperCase()}
            </div>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-medium text-gray-900 truncate">{user?.full_name || 'User'}</p>
              <p className="text-xs text-gray-400 truncate">{user?.email}</p>
            </div>
          </div>
          <button onClick={onLogout} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-colors">
            <Icon name="logout" cls="w-4 h-4" /> Sign Out
          </button>
        </div>
      </div>

      {/* Main content */}
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="bg-white border-b border-gray-100 px-6 py-4">
          <h1 className="font-bold text-gray-900 text-lg">{titles[active]}</h1>
        </div>
        <div className="flex-1 overflow-y-auto p-6">
          <div className="max-w-2xl mx-auto">
            {panels[active]}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── App Root ──────────────────────────────────────────────────────────────────
const App = () => {
  const [token, setToken] = useState(localStorage.getItem('token'));
  const [user, setUser] = useState(null);

  useEffect(() => {
    if (token && !user) {
      apiFetch('/api/auth/me', {}, token).then(setUser).catch(() => { localStorage.removeItem('token'); setToken(null); });
    }
  }, [token]);

  const onLogin = (tok, usr) => { setToken(tok); setUser(usr); };
  const onLogout = () => { localStorage.removeItem('token'); setToken(null); setUser(null); };

  if (!token || !user) return <AuthPage onLogin={onLogin} />;
  return <Dashboard user={user} token={token} onLogout={onLogout} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
